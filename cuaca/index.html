<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Premium</title><style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
width:90%;
max-width:400px;
padding:25px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
text-align:center;
}

h1{
margin-top:0;
}

input{
width:90%;
padding:12px;
border:none;
border-radius:12px;
background:#f1f1f1;
font-size:16px;
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

#hasil{
margin-top:20px;
font-size:18px;
font-weight:bold;
}
</style></head><body><div class="card"><h1>🌦 Weather Premium</h1><input id="kota" placeholder="Masukkan kota"><br><button onclick="cekCuaca()">Cari Cuaca</button>

<div id="hasil"></div></div><script>
async function cekCuaca(){

let kota=document.getElementById("kota").value;

let hasil=document.getElementById("hasil");

hasil.innerHTML="Loading...";

try{

let res=await fetch(
"https://wttr.in/"+kota+"?format=3"
);

let data=await res.text();

hasil.innerHTML=data;

}catch{

hasil.innerHTML="Gagal mengambil data";

}

}
</script></body>
</html>
