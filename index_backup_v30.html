<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Engga Cyber Academy v29</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding:20px;
}

h1{
color:#22c55e;
}

.card{
background:#1e293b;
border-radius:20px;
padding:20px;
margin:15px auto;
max-width:450px;
box-shadow:0 0 20px #22c55e55;
}

img{
width:120px;
height:120px;
border-radius:50%;
border:3px solid #22c55e;
}

button{
background:#22c55e;
color:white;
border:0;
padding:12px 20px;
border-radius:15px;
margin:5px;
}

input,textarea{
width:90%;
padding:10px;
border-radius:10px;
background:#0f172a;
color:white;
border:1px solid #22c55e;
}

.stat{
display:inline-block;
background:#0f172a;
padding:15px;
border-radius:15px;
margin:5px;
}

.materi{
cursor:pointer;
padding:10px;
border:1px solid #22c55e;
border-radius:10px;
margin:8px;
}

</style>
</head>

<body>

<h1>🟢 ENGGA CYBER ACADEMY v29</h1>

<div class="card">

<img src="icon.png">

<h2 id="nama">Cyber Student</h2>

<input id="user" placeholder="Masukkan nama">

<br><br>

<button onclick="simpanNama()">Simpan Nama</button>

</div>


<div class="card">

<h2>🏆 Profil Cyber</h2>

<div class="stat">
⭐ XP
<h2 id="xp">0</h2>
</div>

<div class="stat">
🏅 Level
<h2 id="level">Beginner</h2>
</div>

<div class="stat">
🎖️ Badge
<h2 id="badge">🔰</h2>
</div>

<br>

<button onclick="tambahXP()">+10 XP</button>

</div>


<div class="card">

<h2>📚 Modul Belajar</h2>

<div class="materi" onclick="belajar('Linux')">
🐧 Linux Dasar
</div>

<div class="materi" onclick="belajar('Networking')">
🌐 Networking
</div>

<div class="materi" onclick="belajar('Python')">
🐍 Python
</div>

<div class="materi" onclick="belajar('Nmap')">
🔍 Nmap
</div>

<p id="hasil"></p>

</div>


<div class="card">

<h2>🧪 Quiz Cyber</h2>

<p>Apa fungsi Nmap?</p>

<button onclick="jawab(true)">
Scan jaringan
</button>

<button onclick="jawab(false)">
Edit foto
</button>

<p id="quiz"></p>

</div>


<div class="card">

<h2>📝 Catatan Belajar</h2>

<textarea id="catatan"
rows="5"
placeholder="Tulis catatan...">
</textarea>

<br>

<button onclick="simpanCatatan()">
Simpan
</button>

</div>


<script>

let xp =
parseInt(localStorage.getItem("xp")) || 0;


function update(){

document.getElementById("xp").innerHTML=xp;

let level="Beginner";
let badge="🔰 Pemula";


if(xp>=50){
level="Explorer";
badge="⭐ Explorer";
}


if(xp>=100){
level="Cyber Learner";
badge="🌟 Cyber Learner";
}


if(xp>=200){
level="Cyber Master";
badge="👑 Cyber Master";
}


document.getElementById("level").innerHTML=level;

document.getElementById("badge").innerHTML=badge;


localStorage.setItem("xp",xp);

}


function tambahXP(){

xp+=10;

update();

}


function simpanNama(){

let n=document.getElementById("user").value;

localStorage.setItem("nama",n);

document.getElementById("nama").innerHTML=n;

}


let nama=
localStorage.getItem("nama");

if(nama){

document.getElementById("nama").innerHTML=nama;

}


function belajar(x){

document.getElementById("hasil").innerHTML=
"Sedang belajar "+x+" 🚀";

}


function jawab(benar){

if(benar){

xp+=20;

document.getElementById("quiz").innerHTML=
"Benar! +20 XP 🎉";

update();

}

else{

document.getElementById("quiz").innerHTML=
"Salah coba lagi";

}

}


function simpanCatatan(){

let c=
document.getElementById("catatan").value;

localStorage.setItem("catatan",c);

alert("Catatan tersimpan");

}


let c=
localStorage.getItem("catatan");

if(c){

document.getElementById("catatan").value=c;

}


update();

</script>

</body>
</html>
