<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engga Setya Dewi</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9ecf,#ffd6e7,#ffffff);
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(15px);
padding:30px;
border-radius:25px;
text-align:center;
box-shadow:0 8px 30px rgba(0,0,0,0.15);
animation:muncul 1s ease;
}

@keyframes muncul{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.foto{
width:120px;
height:120px;
border-radius:50%;
margin:auto;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:60px;
}

h1{
margin-top:15px;
color:#ff2f7d;
}

.bio{
margin-top:10px;
color:#444;
line-height:1.6;
}

.btn{
display:block;
margin-top:15px;
padding:15px;
border-radius:15px;
text-decoration:none;
font-weight:bold;
color:white;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

.wa{background:#25D366;}
.ig{background:#E1306C;}
.yt{background:#FF0000;}

.footer{
margin-top:20px;
font-size:13px;
color:#666;
}
</style>
</head>

<body>

<div class="card">

<div class="foto">🌸</div>

<h1>Engga Setya Dewi</h1>

<p class="bio">
Tidak semua kisah harus didengar,<br>
sebagian cukup dipahami oleh hati.
</p>

<a class="btn wa"
href="https://wa.me/6283195289657">
💬 WhatsApp
</a>

<a class="btn ig"
href="https://www.instagram.com/its_dewi.__/"
target="_blank">
📸 Instagram
</a>

<a class="btn yt"
href="https://youtube.com/@lucunyamereka"
target="_blank">
▶️ YouTube Lucunya Mereka
</a>

<div class="footer">
Dibuat dengan ❤️ oleh Engga Setya Dewi
</div>

</div>

</body>
</html>
